<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Calculadora Quiniela</title>
<style>
body{font-family:Arial;margin:0;background:#f4f7fb;color:#12263a}.w{width:min(1200px,96%);margin:18px auto}.c{background:white;border:1px solid #d7e0ea;border-radius:12px;padding:15px;margin-bottom:14px}.g{display:grid;grid-template-columns:1fr 1fr;gap:10px}input,select{width:100%;padding:9px;border:1px solid #cbd6e2;border-radius:7px;box-sizing:border-box}button{padding:10px 13px;border:0;border-radius:7px;font-weight:bold;cursor:pointer}.p{background:#2457d6;color:white}.s{background:#e8eef6}.d{background:#fee2e2;color:#991b1b}.a{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}.tw{overflow:auto}table{border-collapse:collapse;width:100%;min-width:1100px}th,td{padding:7px;border-bottom:1px solid #d7e0ea}th{background:#f7f9fc;font-size:12px}.pts{font-weight:bold;text-align:center}.pos{color:#159947}.neg{color:#d93025}@media(max-width:700px){.g{grid-template-columns:1fr}}
</style></head><body><div class="w"><h1>Calculadora simple de quiniela</h1>
<div class="c"><h2>Partido</h2><div class="g"><div><label>Local</label><input id="local" value="España"></div><div><label>Visitante</label><input id="visitante" value="Francia"></div></div></div>
<div class="c"><h2>Resultado real</h2><div class="g">
<div><label>Clasificó</label><select id="rc"></select></div>
<div><label>Goles local 90'</label><input id="rgl" type="number" min="0" value="0"></div>
<div><label>Goles visitante 90'</label><input id="rgv" type="number" min="0" value="0"></div>
<div><label>¿Hubo penal durante el partido?</label><select id="rpen"><option value="no">No</option><option value="si">Sí</option></select></div>
<div><label>Primer gol</label><select id="rprim"></select></div>
</div></div>
<div class="c"><h2>Predicciones</h2><div class="tw"><table><thead><tr><th>Jugador</th><th>Clasifica</th><th>Resultado 90'</th><th>Gol local</th><th>Gol visita</th><th>¿Penal?</th><th>Primer gol</th><th>Total goles</th><th>Puntos</th><th></th></tr></thead><tbody id="tb"></tbody></table></div>
<div class="a"><button class="s" onclick="add()">+ Jugador</button><button class="p" onclick="calc()">Calcular</button><button class="s" onclick="save()">Guardar</button><button class="d" onclick="clearAll()">Limpiar</button></div>
<p>Reglas: clasifica +6/-4; resultado +4/-2; marcador +8/0; penal +3/-2; primer gol +2/-1; total +3/-1.</p></div></div>
<script>
const $=x=>document.getElementById(x);
function teams(){return{l:$('local').value||'Local',v:$('visitante').value||'Visitante'}}
function opts(n=false){let e=teams();return `<option value="l">${e.l}</option><option value="v">${e.v}</option>${n?'<option value="n">Ninguno (0-0)</option>':''}`}
function refresh(){let a=$('rc').value,b=$('rprim').value;$('rc').innerHTML=opts();$('rprim').innerHTML=opts(true);if(a)$('rc').value=a;if(b)$('rprim').value=b;document.querySelectorAll('.cl').forEach(x=>{let v=x.value;x.innerHTML=opts();if(v)x.value=v});document.querySelectorAll('.pr').forEach(x=>{let v=x.value;x.innerHTML=opts(true);if(v)x.value=v})}
function add(d={}){let tr=document.createElement('tr');tr.innerHTML=`<td><input class="nm" value="${d.n||''}"></td><td><select class="cl">${opts()}</select></td><td><select class="res"><option value="l">Gana local</option><option value="e">Empate</option><option value="v">Gana visitante</option></select></td><td><input class="gl" type="number" min="0" value="${d.gl??0}"></td><td><input class="gv" type="number" min="0" value="${d.gv??0}"></td><td><select class="pen"><option value="no">No</option><option value="si">Sí</option></select></td><td><select class="pr">${opts(true)}</select></td><td><select class="tot"><option>0</option><option>1</option><option>2</option><option>3</option><option value="4+">4+</option></select></td><td class="pts">0</td><td><button class="d" onclick="this.closest('tr').remove()">X</button></td>`;$('tb').appendChild(tr);if(d.c)tr.querySelector('.cl').value=d.c;if(d.r)tr.querySelector('.res').value=d.r;if(d.p)tr.querySelector('.pen').value=d.p;if(d.pr)tr.querySelector('.pr').value=d.pr;if(d.t)tr.querySelector('.tot').value=d.t}
function calc(){let gl=+$('rgl').value,gv=+$('rgv').value,r=gl>gv?'l':gv>gl?'v':'e',tot=gl+gv>=4?'4+':String(gl+gv),pr=(gl==0&&gv==0)?'n':$('rprim').value;document.querySelectorAll('#tb tr').forEach(tr=>{let p=0;p+=tr.querySelector('.cl').value==$('rc').value?6:-4;p+=tr.querySelector('.res').value==r?4:-2;p+=(+tr.querySelector('.gl').value==gl&&+tr.querySelector('.gv').value==gv)?8:0;p+=tr.querySelector('.pen').value==$('rpen').value?3:-2;p+=tr.querySelector('.pr').value==pr?2:-1;p+=tr.querySelector('.tot').value==tot?3:-1;let c=tr.querySelector('.pts');c.textContent=p;c.className='pts '+(p>=0?'pos':'neg')});save()}
function save(){let data={l:$('local').value,v:$('visitante').value,real:{c:$('rc').value,gl:$('rgl').value,gv:$('rgv').value,p:$('rpen').value,pr:$('rprim').value},rows:[...document.querySelectorAll('#tb tr')].map(tr=>({n:tr.querySelector('.nm').value,c:tr.querySelector('.cl').value,r:tr.querySelector('.res').value,gl:tr.querySelector('.gl').value,gv:tr.querySelector('.gv').value,p:tr.querySelector('.pen').value,pr:tr.querySelector('.pr').value,t:tr.querySelector('.tot').value}))};localStorage.setItem('qsimple',JSON.stringify(data))}
function load(){let z=localStorage.getItem('qsimple');if(!z){['Christopher Villaneda','Marlon Aldaz','Yasibit','Adriana Peña','Diego Peña','Grissel','Camila','Vicky','Junior','Pamela Pizarro','William','Miguel Rodríguez','Andre Heredia','Miguel Ospina'].forEach(n=>add({n}));return}let d=JSON.parse(z);$('local').value=d.l;$('visitante').value=d.v;refresh();$('rc').value=d.real.c;$('rgl').value=d.real.gl;$('rgv').value=d.real.gv;$('rpen').value=d.real.p;$('rprim').value=d.real.pr;d.rows.forEach(add)}
function clearAll(){if(confirm('¿Borrar todo?')){localStorage.removeItem('qsimple');$('tb').innerHTML=''}}
$('local').oninput=refresh;$('visitante').oninput=refresh;refresh();load();
</script></body></html>
